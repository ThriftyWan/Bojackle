<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOJACKLE — Daily Episode Guesser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{background:#0e0d18;min-height:100%}
body{background:#0e0d18;color:#e8e0d0;font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:48px}
.app{max-width:660px;margin:0 auto;padding:14px 14px 0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 0 13px;border-bottom:1px solid #221f40;margin-bottom:16px}
.logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:#f5c842;letter-spacing:-1px;line-height:1.1;user-select:none}
.logo small{display:block;font-size:9px;font-weight:600;letter-spacing:3px;color:#5a5770;font-family:'DM Sans',sans-serif;text-transform:uppercase;margin-top:1px}
.topbtns{display:flex;gap:5px}
.tbtn{background:transparent;border:1px solid #2a2845;border-radius:7px;padding:5px 10px;color:#6b6888;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:.3px;transition:all .15s}
.tbtn:hover{background:#1a1930;color:#c8c0e0;border-color:#3a3858}
.tbtn.act{border-color:#f5c842;color:#f5c842;background:#1a1828}
/* Nav */
.pnav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px}
.navbtn{background:transparent;border:1px solid #2a2845;border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#6b6888;font-size:12px;transition:all .15s;flex-shrink:0;font-family:'DM Sans',sans-serif}
.navbtn:hover:not(:disabled){background:#1a1930;color:#e8e0d0}
.navbtn:disabled{opacity:.2;cursor:default}
.pinfo{text-align:center;min-width:160px}
.pnum{font-size:13px;font-weight:600;color:#a89fc0;letter-spacing:.4px}
.pdate{font-size:11px;color:#4a4865;margin-top:2px}
/* Screenshots */
.sgrid{display:grid;gap:5px;margin-bottom:12px}
.g1{grid-template-columns:1fr}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:1fr 1fr}.g5{grid-template-columns:1fr 1fr 1fr}
.shotw{position:relative;border-radius:7px;overflow:hidden;border:1px solid #2a2845;aspect-ratio:16/9;background:#0a0918}
.shotw img{width:100%;height:100%;object-fit:cover;display:block}
.snum{position:absolute;top:5px;left:6px;background:rgba(0,0,0,.75);border-radius:4px;padding:2px 7px;font-size:10px;color:#a89fc0;font-weight:700;letter-spacing:.5px}
.newbadge{position:absolute;top:5px;right:6px;background:#f5c842;color:#0e0d18;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:700;letter-spacing:.5px;animation:pop .3s}
/* Progress */
.prow{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.dots{display:flex;gap:5px}
.dot{width:9px;height:9px;border-radius:50%;background:#221f40;transition:background .3s}
.dot.l{background:#f5c842}.dot.g{background:#42b27a}.dot.r{background:#e84a5f}.dot.sk{background:#3a3858}
.pcnt{font-size:11px;color:#4a4865}
/* Input */
.swr{position:relative;margin-bottom:7px}
.si{width:100%;background:#14132a;border:1.5px solid #2a2845;border-radius:9px;padding:11px 14px;font-size:14px;color:#e8e0d0;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.si:focus{border-color:#f5c842}.si::placeholder{color:#3a3858}
.ddown{position:absolute;top:calc(100% + 3px);left:0;right:0;background:#14132a;border:1px solid #2a2845;border-radius:9px;overflow:hidden;z-index:100;max-height:220px;overflow-y:auto;box-shadow:0 8px 28px rgba(0,0,0,.6)}
.ddown::-webkit-scrollbar{width:3px}.ddown::-webkit-scrollbar-thumb{background:#2a2845;border-radius:2px}
.sug{padding:9px 14px;cursor:pointer;font-size:13px;color:#c0b8d8;border-bottom:1px solid #1c1b30;display:flex;align-items:center;gap:9px;transition:background .1s}
.sug:last-child{border-bottom:none}.sug:hover,.sug.hi{background:#1e1c38;color:#f5c842}
.eid{font-size:10px;color:#5a5770;font-weight:700;flex-shrink:0;min-width:40px;letter-spacing:.4px}
/* Buttons */
.brow{display:flex;gap:6px;margin-bottom:7px}
.btn{padding:10px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .15s;flex:1}
.bp{background:#f5c842;color:#0e0d18}.bp:hover{background:#ffd84a}.bp:disabled{background:#221f40;color:#3a3858;cursor:not-allowed}
.bs{background:transparent;color:#6b6888;border:1px solid #2a2845}.bs:hover{background:#1a1930;color:#a898c0}.bs:disabled{opacity:.3;cursor:not-allowed}
/* Guesses */
.glist{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.gi{display:flex;align-items:center;gap:9px;padding:8px 13px;border-radius:7px;font-size:13px;animation:slin .2s ease}
.gi.g{background:#0e1e14;border:1px solid #1a4028;color:#42b27a}
.gi.r{background:#1e0e14;border:1px solid #481828;color:#d07888}
.gi.sk{background:#16152a;border:1px solid #221f40;color:#3a3858}
/* Result */
.rc{background:#16152a;border:1px solid #2a2845;border-radius:14px;padding:22px 18px;text-align:center;margin-top:12px}
.rtt{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin:10px 0 4px}
.rtt.won{color:#f5c842}.rtt.lost{color:#e84a5f}
.rep{font-size:12px;color:#5a5770;margin-bottom:3px}
.ren{font-size:15px;font-weight:600;color:#e8e0d0;margin-bottom:8px}
.rsn{display:inline-block;background:#1a1828;border:1px solid #2a2845;border-radius:20px;padding:2px 12px;font-size:11px;color:#a898c0;margin-bottom:12px}
.sdots{display:flex;gap:4px;justify-content:center;margin-bottom:14px}
.ssq{width:17px;height:17px;border-radius:3px;background:#221f40}
.ssq.g{background:#42b27a}.ssq.r{background:#e84a5f}.ssq.sk{background:#3a3858}
.sbtn{background:#f5c842;color:#0e0d18;border:none;border-radius:7px;padding:10px 22px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.sbtn:hover{background:#ffd84a}
.copiedtxt{font-size:11px;color:#42b27a;margin-top:6px;min-height:16px}
/* Archive */
.sht{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.bkbtn{background:transparent;border:1px solid #2a2845;border-radius:7px;padding:6px 11px;color:#6b6888;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s}
.bkbtn:hover{background:#1a1930;color:#e8e0d0}
.sectitle{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:#e8e0d0}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.acard{background:#14132a;border:1px solid #221f40;border-radius:11px;padding:12px;cursor:pointer;transition:all .2s}
.acard:hover{border-color:#3a3858;background:#1a1930}.acard.cur{border-color:#f5c842}
.act2{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.acn{font-size:10px;font-weight:700;color:#5a5770;letter-spacing:.6px;text-transform:uppercase}
.acd{font-size:11px;color:#4a4865;margin-bottom:3px}
.ace{font-size:13px;font-weight:600;color:#e8e0d0;line-height:1.3}.ace.u{color:#3a3858;font-style:italic}
/* Misc */
.nopu{text-align:center;padding:50px 0}
.nopu h3{font-family:'Playfair Display',serif;font-size:18px;color:#5a5770;margin-bottom:7px}
.nopu p{font-size:13px;line-height:1.6;color:#4a4865}
.loading-txt{text-align:center;padding:60px;color:#4a4865;font-size:13px}
.err-box{background:#1e0e14;border:1px solid #481828;border-radius:10px;padding:16px 18px;text-align:center;margin-top:16px}
.err-box h3{font-size:15px;color:#e84a5f;margin-bottom:6px}
.err-box p{font-size:12px;color:#a06070;line-height:1.7}
/* Setup */
.setup-screen{background:#14132a;border:1px solid #2a2845;border-radius:14px;padding:28px 22px;margin-top:8px}
.setup-screen h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#f5c842;margin-bottom:8px}
.setup-screen p{font-size:13px;color:#a89fc0;line-height:1.7;margin-bottom:16px}
.step{display:flex;gap:12px;margin-bottom:18px;align-items:flex-start}
.step-num{background:#221f40;border-radius:50%;width:24px;height:24px;min-width:24px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#a89fc0;margin-top:1px}
.step-body{flex:1}
.step-body strong{display:block;font-size:13px;color:#e8e0d0;margin-bottom:3px}
.step-body p{font-size:12px;color:#6b6888;line-height:1.7;margin:0}
.code-block{background:#0e0d18;border:1px solid #2a2845;border-radius:6px;padding:10px 13px;font-family:'Courier New',monospace;font-size:11px;color:#f5c842;margin-top:8px;word-break:break-all;line-height:1.8;white-space:pre-wrap}
.setup-note{font-size:12px;color:#4a4865;line-height:1.7;margin-top:18px;padding-top:16px;border-top:1px solid #221f40}
@keyframes pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes slin{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">BOJACKLE<small>Episode Guesser</small></div>
    <div class="topbtns">
      <button class="tbtn" id="btn-game" onclick="switchView('game')">Today</button>
      <button class="tbtn" id="btn-archive" onclick="switchView('archive')">Archive</button>
    </div>
  </div>
  <div id="main-content"><div class="loading-txt">Loading Bojackle...</div></div>
</div>

<script>
/* =====================================================
   Paste your Supabase credentials here.
===================================================== */
const SUPABASE_URL  = 'https://onwgqxzzkcqphqlhlwgw.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ud2dxeHp6a2NxcGhxbGhsd2d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MTM5MTMsImV4cCI6MjA4OTE4OTkxM30.u7HmsgHtfGe4P2hZS7wJIHgxVc9swKkDLGj_qivr0tA';

/* ── Supabase ── */
let db = null;
function initDB(){
  if(SUPABASE_URL === 'YOUR_SUPABASE_URL') return false;
  try{ db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON); return true; }
  catch(e){ console.error('Supabase init error', e); return false; }
}
async function dbAll(){
  const {data, error} = await db.from('puzzles').select('*').order('date');
  if(error) throw error;
  return data || [];
}

/* ── localStorage (player progress only) ── */
const LS = {
  get(k){ try{ const v=localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch{ return null; } },
  set(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); } catch{} },
};
const getGS    = d => LS.get('bj-gs-'+d);
const saveGS   = (d,v) => LS.set('bj-gs-'+d, v);
const getComp  = () => LS.get('bj-comp') || {};
const saveComp = v => LS.set('bj-comp', v);

/* ── Episode list (for the guess autocomplete) ── */
const EPS = [
  [1,1,'BoJack Horseman: The BoJack Horseman Story, Chapter One'],
  [1,2,'BoJack Horseman: The BoJack Horseman Story, Chapter Two'],
  [1,3,'Prickly-Muffin'],[1,4,'Zoes and Zeldas'],[1,5,'Live Fast, Diane Nguyen'],
  [1,6,'Our A-Story Is a "D" Story'],[1,7,'Say Anything'],[1,8,'The Telescope'],
  [1,9,'Horse Majeure'],[1,10,'One Trick Pony'],[1,11,'Downer Ending'],[1,12,'Later'],
  [2,1,'Brand New Couch'],[2,2,'Yesterdayland'],[2,3,'Still Broken'],[2,4,'After the Party'],
  [2,5,'Chickens'],[2,6,'Higher Love'],[2,7,"Let's Find Out"],[2,8,'Start Spreading the News'],
  [2,9,'The Shot'],[2,10,'Yes And'],[2,11,'Bojack Kills'],[2,12,'Out to Sea'],
  [3,1,'Start Spreading the News'],[3,2,'The BoJack Horseman Show'],[3,3,'BoJack Kills'],
  [3,4,'Fish Out of Water'],[3,5,'Love And/Or Marriage'],[3,6,'Brrap Brrap Pew Pew'],
  [3,7,'Stop the Presses'],[3,8,'Old Acquaintance'],[3,9,'Best Thing That Ever Happened'],
  [3,10,"It's You"],[3,11,"That's Too Much, Man!"],[3,12,'That Went Well'],
  [4,1,'See Mr. Peanutbutter Run'],[4,2,'The Old Sugarman Place'],[4,3,'Hooray! Todd Episode!'],
  [4,4,'Commence Fracking'],[4,5,'Thoughts and Prayers'],[4,6,'Stupid Piece of Sh*t'],
  [4,7,'Underground'],[4,8,'The Judge'],[4,9,'Ruthie'],[4,10,'lovin that cali lifestyle!!'],
  [4,11,"Time's Arrow"],[4,12,'What Time Is It Right Now'],
  [5,1,'The Light Bulb Scene'],[5,2,'The Dog Days Are Over'],[5,3,'Planned Obsolescence'],
  [5,4,'BoJack the Feminist'],[5,5,'The Amelia Earhart Story'],[5,6,'Free Churro'],
  [5,7,'INT. SUB'],[5,8,'Ancient History'],[5,9,'The Stopped Show'],
  [5,10,'Head in the Clouds'],[5,11,'The Showstopper'],[5,12,'The Kidney Stays in the Picture'],
  [6,1,'A Horse Walks into a Rehab'],[6,2,'The New Client'],[6,3,'Feel-Good Story'],
  [6,4,'Surprise!'],[6,5,'A Little Uneven, Is All'],[6,6,'The Kidney Stays in the Picture'],
  [6,7,'Intermediate Scene'],[6,8,"A Quick One, While He's Away"],[6,9,'List of Waters'],
  [6,10,'Good Damage'],[6,11,'Sunk Cost and All That'],[6,12,'Xerox of a Xerox'],
  [6,13,'Common Cold Logic'],[6,14,'BoJack Horseman: The End of the World'],
  [6,15,'The View from Halfway Down'],[6,16,'Nice While It Lasted']
].map(([s,e,t]) => ({
  season:s, ep:e,
  id:`S${String(s).padStart(2,'0')}E${String(e).padStart(2,'0')}`,
  title:t
}));

/* ── Utils ── */
function todayStr(){ const d=new Date(); return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`; }
function fmtDate(ds){ if(!ds) return ''; const[y,m,d]=ds.split('-'); return new Date(+y,+m-1,+d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hi(t,q){ if(!q.trim()) return esc(t); const i=t.toLowerCase().indexOf(q.toLowerCase()); if(i<0) return esc(t); return esc(t.slice(0,i))+`<strong style="color:#f5c842">${esc(t.slice(i,i+q.length))}</strong>`+esc(t.slice(i+q.length)); }
function getSugs(q){ if(!q.trim()) return []; const lq=q.toLowerCase(); return EPS.filter(e=>e.title.toLowerCase().includes(lq)||e.id.toLowerCase().includes(lq)).slice(0,8); }

/* ── App state ── */
const A = {
  view:'game', today:todayStr(), ready:false, dbOk:false, loadErr:null,
  puzzles:[], currentDate:null, puzzle:null,
  gs:{status:'playing',guesses:[],revealed:1}, comp:{},
  input:'', focusIdx:-1, copied:false,
};

/* ── Boot ── */
async function boot(){
  A.dbOk = initDB();
  if(!A.dbOk){ render(); return; }
  A.comp = getComp();
  try{
    A.puzzles = await dbAll();
    const avail = A.puzzles.filter(p => p.date <= A.today);
    if(avail.length){
      const latest = avail[avail.length-1];
      A.currentDate = latest.date;
      A.puzzle = latest;
      A.gs = getGS(A.currentDate) || {status:'playing',guesses:[],revealed:1};
    }
    A.ready = true;
  } catch(e){
    console.error('Boot error', e);
    A.loadErr = e.message;
    A.ready = true;
  }
  render();
}

/* ── Navigation ── */
window.switchView = v => { A.view=v; render(); };

window.navigate = dir => {
  const avail = A.puzzles.filter(p => p.date <= A.today);
  const ni = avail.findIndex(p => p.date === A.currentDate) + dir;
  if(ni < 0 || ni >= avail.length) return;
  A.currentDate = avail[ni].date;
  A.puzzle = avail[ni];
  A.gs = getGS(A.currentDate) || {status:'playing',guesses:[],revealed:1};
  A.input=''; A.focusIdx=-1;
  render();
};

window.goToDate = date => {
  const p = A.puzzles.find(p => p.date === date);
  if(!p) return;
  A.currentDate=date; A.puzzle=p; A.view='game';
  A.gs = getGS(date) || {status:'playing',guesses:[],revealed:1};
  A.input=''; A.focusIdx=-1;
  render();
};

/* ── Game logic ── */
function makeGuess(title){
  const correct = title === A.puzzle.title;
  A.gs.guesses.push({text:title, correct, skip:false});
  A.input=''; A.focusIdx=-1;
  if(correct){ A.gs.status='won'; markComp('won'); }
  else if(A.gs.guesses.length >= 5){ A.gs.status='lost'; markComp('lost'); }
  else A.gs.revealed = Math.min(A.gs.revealed+1, 5);
  saveGS(A.currentDate, A.gs);
  render();
}

window.doSkip = () => {
  A.gs.guesses.push({text:'Skipped', correct:false, skip:true});
  if(A.gs.guesses.length >= 5){ A.gs.status='lost'; markComp('lost'); }
  else A.gs.revealed = Math.min(A.gs.revealed+1, 5);
  saveGS(A.currentDate, A.gs);
  render();
};

window.submitGuess = () => {
  const sg = getSugs(A.input);
  if(A.focusIdx >= 0 && sg[A.focusIdx]){ makeGuess(sg[A.focusIdx].title); return; }
  const exact = EPS.find(e => e.title.toLowerCase() === A.input.toLowerCase());
  if(exact){ makeGuess(exact.title); return; }
  if(sg.length === 1){ makeGuess(sg[0].title); return; }
  if(A.input.trim()) makeGuess(A.input.trim());
};

function markComp(r){ A.comp[A.currentDate]=r; saveComp(A.comp); }

window.copyShare = () => {
  const avail = A.puzzles.filter(p => p.date <= A.today);
  const n = avail.findIndex(p => p.date === A.currentDate) + 1;
  const sqs = A.gs.guesses.map(g => g.skip?'⬛':g.correct?'🟩':'🟥').join('');
  const res = A.gs.status==='won' ? `${A.gs.guesses.length}/5` : 'X/5';
  const txt = `BOJACKLE #${n} — ${res}\n${sqs}\n\n"It gets easier... every day it gets a little easier."`;
  navigator.clipboard.writeText(txt).then(() => {
    A.copied=true; render();
    setTimeout(() => { A.copied=false; render(); }, 2400);
  });
};

/* ════════════════════════
   RENDER
════════════════════════ */

function renderSetup(){
  return `<div class="setup-screen">
    <h2>Setup Required</h2>
    <p>Open <strong style="color:#c8c0e0">index.html</strong> in a text editor, find these two lines near the top of the &lt;script&gt; block, and replace the placeholder values with your real Supabase credentials:</p>
    <div class="code-block">const SUPABASE_URL  = 'https://xxxxxxxxxxxx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...';</div>
    <p style="margin-top:14px">You can find both values in your Supabase dashboard under <strong style="color:#c8c0e0">Project Settings &rarr; API</strong>. Once updated, re-upload the file to GitHub and your site will be live.</p>
    <p class="setup-note">New to this? Ask Claude to walk you through the full Supabase setup.</p>
  </div>`;
}

function renderGame(){
  if(!A.ready) return `<div class="loading-txt">Loading...</div>`;

  if(A.loadErr) return `<div class="err-box">
    <h3>Couldn't load puzzles</h3>
    <p>There was a problem connecting to the database.<br>Check your Supabase credentials in index.html.<br><small style="opacity:.6">${esc(A.loadErr)}</small></p>
  </div>`;

  const avail = A.puzzles.filter(p => p.date <= A.today);
  if(!avail.length) return `<div class="nopu"><h3>No puzzles yet</h3><p>Add the first one via the<br>Supabase Table Editor.</p></div>`;

  const pos = avail.findIndex(p => p.date === A.currentDate);
  const isLatest = pos === avail.length - 1;

  const navH = `<div class="pnav">
    <button class="navbtn" onclick="navigate(-1)" ${pos<=0?'disabled':''}>&larr;</button>
    <div class="pinfo">
      <div class="pnum">BOJACKLE #${pos+1}</div>
      <div class="pdate">${fmtDate(A.currentDate)}${isLatest?' &middot; Latest':''}</div>
    </div>
    <button class="navbtn" onclick="navigate(1)" ${pos>=avail.length-1?'disabled':''}>&rarr;</button>
  </div>`;

  if(!A.puzzle) return navH + `<div class="nopu"><h3>No puzzle for this date</h3></div>`;

  const {status, guesses, revealed} = A.gs;
  const shots = A.puzzle.shots.slice(0, status !== 'playing' ? 5 : revealed);
  const gc = ['','g1','g2','g3','g4','g5'][shots.length] || 'g5';

  const dotsH = Array.from({length:5}, (_,i) => {
    const g = guesses[i]; let c = 'dot';
    if(g) c += ' '+(g.skip ? 'sk' : g.correct ? 'g' : 'r');
    else if(i < revealed) c += ' l';
    return `<div class="${c}"></div>`;
  }).join('');

  const shotsH = shots.map((s,i) =>
    `<div class="shotw">
      <img src="${esc(s)}" alt="Screenshot ${i+1}" loading="lazy"/>
      <div class="snum">#${i+1}</div>
      ${status==='playing' && i===shots.length-1 && revealed>1 ? '<div class="newbadge">NEW</div>' : ''}
    </div>`
  ).join('');

  const guessH = guesses.map(g =>
    `<div class="gi ${g.skip?'sk':g.correct?'g':'r'}">
      <span>${g.skip?'&rarr;':g.correct?'&#10003;':'&#10007;'}</span>
      <span>${esc(g.text)}</span>
    </div>`
  ).join('');

  let body = '';

  if(status !== 'playing'){
    const won = status === 'won';
    const sqH = Array.from({length:5}, (_,i) => {
      const g = guesses[i]; const c = g ? (g.skip?'sk':g.correct?'g':'r') : '';
      return `<div class="ssq ${c}"></div>`;
    }).join('');
    body = `<div class="rc">
      <div style="font-size:44px">${won ? '🐴' : '💔'}</div>
      <div class="rtt ${status}">${won ? "Neigh-borly!" : "Horsin' Around"}</div>
      <div class="rep">${esc(A.puzzle.ep_id)} &middot; Season ${A.puzzle.season}</div>
      <div class="ren">&ldquo;${esc(A.puzzle.title)}&rdquo;</div>
      <span class="rsn">Season ${A.puzzle.season}</span>
      <div class="sdots">${sqH}</div>
      <button class="sbtn" onclick="copyShare()">${A.copied ? '&#10003; Copied!' : 'Share Results'}</button>
      <div class="copiedtxt">${A.copied ? 'Copied to clipboard!' : ''}</div>
    </div>
    ${guesses.length ? `<div class="glist" style="margin-top:10px">${guessH}</div>` : ''}`;
  } else {
    const sg = getSugs(A.input);
    const showD = A.input.trim() && sg.length > 0;
    body = `<div class="swr">
      <input class="si" id="gsi" type="text" placeholder="Search episode title..." value="${esc(A.input)}" autocomplete="off" spellcheck="false"/>
      ${showD ? `<div class="ddown" id="gdrop">${sg.map((e,i) =>
        `<div class="sug${i===A.focusIdx?' hi':''}" data-title="${esc(e.title)}">
          <span class="eid">${e.id}</span>${hi(e.title, A.input)}
        </div>`
      ).join('')}</div>` : ''}
    </div>
    <div class="brow">
      <button class="btn bs" ${revealed>=5?'disabled':''} onclick="doSkip()">Skip &mdash; Reveal Next Clue</button>
      <button class="btn bp" ${!A.input.trim()?'disabled':''} onclick="submitGuess()">Guess</button>
    </div>
    ${guesses.length ? `<div class="glist">${guessH}</div>` : ''}`;
  }

  return `${navH}
    <div class="prow">
      <div class="dots">${dotsH}</div>
      <div class="pcnt">${
        status==='playing'
          ? `Clue ${revealed}/5 &middot; ${5-guesses.length} guess${5-guesses.length===1?'':'es'} left`
          : status==='won' ? 'You got it! 🎉' : 'Better luck tomorrow'
      }</div>
    </div>
    <div class="sgrid ${gc}">${shotsH}</div>
    ${body}`;
}

function renderArchive(){
  const avail = [...A.puzzles].filter(p => p.date <= A.today).reverse();
  return `<div class="sht">
    <button class="bkbtn" onclick="switchView('game')">&larr; Back</button>
    <span class="sectitle">All Puzzles</span>
  </div>
  ${!avail.length
    ? `<div class="nopu"><h3>No puzzles yet</h3><p>Add one via the Supabase Table Editor.</p></div>`
    : `<div class="agrid">${avail.map(p => {
        const allAvail = A.puzzles.filter(x => x.date <= A.today);
        const n = allAvail.findIndex(x => x.date === p.date) + 1;
        const done = A.comp[p.date];
        const icon = done==='won' ? '🟩' : done==='lost' ? '🟥' : '';
        return `<div class="acard${A.currentDate===p.date?' cur':''}" onclick="goToDate('${p.date}')">
          <div class="act2"><span class="acn">#${n}</span><span style="font-size:14px">${icon}</span></div>
          <div class="acd">${fmtDate(p.date)}</div>
          <div class="ace${!done?' u':''}">${done ? esc(p.title) : '???'}</div>
        </div>`;
      }).join('')}</div>`
  }`;
}

/* ── Main render ── */
function render(){
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('act'));
  document.getElementById('btn-'+A.view)?.classList.add('act');
  const mc = document.getElementById('main-content');
  if(!A.dbOk || SUPABASE_URL === 'YOUR_SUPABASE_URL'){ mc.innerHTML=renderSetup(); return; }
  if(A.view === 'game')         mc.innerHTML = renderGame();
  else if(A.view === 'archive') mc.innerHTML = renderArchive();
  bindEvents();
}

/* ── Event binding ── */
function bindEvents(){
  const gsi = document.getElementById('gsi');
  if(gsi){
    gsi.focus(); gsi.setSelectionRange(gsi.value.length, gsi.value.length);
    gsi.addEventListener('input', e => { A.input=e.target.value; A.focusIdx=-1; render(); });
    gsi.addEventListener('keydown', e => {
      const sg = getSugs(A.input);
      if(e.key==='ArrowDown'){ e.preventDefault(); A.focusIdx=Math.min(A.focusIdx+1,sg.length-1); render(); }
      else if(e.key==='ArrowUp'){ e.preventDefault(); A.focusIdx=Math.max(A.focusIdx-1,-1); render(); }
      else if(e.key==='Enter'){ e.preventDefault();
        if(A.focusIdx>=0 && sg[A.focusIdx]) makeGuess(sg[A.focusIdx].title);
        else if(A.input.trim()) submitGuess();
      }
      else if(e.key==='Escape'){ A.input=''; render(); }
    });
    document.querySelectorAll('#gdrop .sug').forEach(el => {
      el.addEventListener('mousedown', e => e.preventDefault());
      el.addEventListener('click', () => makeGuess(el.dataset.title));
    });
  }
}

boot();
</script>
